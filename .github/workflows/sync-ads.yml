name: Sync Ad Metrics

on:
  schedule:
    # H2S weekly cron: Mon 05:00 IST  = Sun 23:30 UTC
    - cron: '30 23 * * 0'
    # Existing 6-hourly sync kept
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run extraction
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
          AMAZON_PROFILE_ID: ${{ secrets.AMAZON_PROFILE_ID }}
          FLIPKART_CLIENT_ID: ${{ secrets.FLIPKART_CLIENT_ID }}
          FLIPKART_CLIENT_SECRET: ${{ secrets.FLIPKART_CLIENT_SECRET }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}
          GOKWIK_API_KEY: ${{ secrets.GOKWIK_API_KEY }}
          GOKWIK_MERCHANT_ID: ${{ secrets.GOKWIK_MERCHANT_ID }}
          LOOKBACK_DAYS: '30'
        run: python main.py
